{% extends "base.html" %}

{% block title %}Admin Add Store Product{% endblock title %}

{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Store Product</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            
        }

        .form-container {
            background: #fff;
            padding: 25px;

            margin: 140px auto;
            max-width: 700px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #3498db;
            outline: none;
        }

        #mybtn {
            width: 100%;
            padding: 12px;
            background: #3498db;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s ease;
        }

        #mybtn:hover {
            background: #2980b9;
        }

        .success {
            color: green;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            background: #d4edda;
            margin-bottom: 15px;
        }

        .error {
            color: red;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            background: #f8d7da;
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            margin-top: 10px;
            display: block;
            color: #2c3e50;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .content-block {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #e9ecef;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        hr {
            border: none;
            border-top: 2px solid #e9ecef;
            margin: 30px 0;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-container {
                margin: 100px 20px;
            }
        }

    </style>
</head>
<body>

<div class="form-container">
    <h2>Add Store Product</h2>


    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Basic Product Information -->
        <div class="section-header">
            <h3>Basic Information</h3>
        </div>

        <div class="form-row">
            <div>
                <label>Product Name *</label>
                <input type="text" name="product_name" placeholder="Enter product name" required>
            </div>
            <div>
                <label>Brand</label>
                <input type="text" name="brand" placeholder="Enter brand name">
            </div>
        </div>

        <!-- Description -->
        <label>Description</label>
        <textarea name="description" placeholder="Enter product description" rows="4"></textarea>

        <!-- Subcategory -->
        <div>
            <label>Subcategory *</label>
            <select name="subcategory" required>
                <option value="">Select Subcategory</option>
                {% for subcategory in subcategories %}
                    <option value="{{ subcategory.id }}">{{ subcategory.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Pricing Information -->
        <div class="section-header">
            <h3>Pricing Information</h3>
        </div>

        <div class="form-row">
            <div>
                <label>Price (Rs) *</label>
                <input type="number" name="price" placeholder="Enter price" step="0.01" min="0" required>
            </div>
            <div>
                <label>Discount Price (Rs)</label>
                <input type="number" name="discount_price" placeholder="Enter discount price" step="0.01" min="0">
            </div>
        </div>

        <!-- Stock Information -->
        <div class="section-header">
            <h3>Stock Information</h3>
        </div>

        <div class="form-row">
            <div>
                <label>Stock Quantity *</label>
                <input type="number" name="stock" placeholder="Enter stock quantity" min="0" required>
            </div>
            <div>
                <label>Medicine Quantity</label>
                <input type="number" name="quantity" placeholder="quantity" min="0">
            </div>

            <div class="form-group">

                <label>
                    Unit Type
                </label>

                <select name="unit_type">

                    <option value="tablet">
                        Tablet
                    </option>

                    <option value="capsule">
                        Capsule
                    </option>

                    <option value="ml">
                        ML
                    </option>

                    <option value="gm">
                        Gram
                    </option>

                </select>

            </div>
        </div>

        <!-- Medicine Information -->
        <div class="form-row">
            <div>
                <label>Expiry Date</label>
                <input type="date" name="expiry_date">
            </div>
            <div>
                <label>Prescription Required</label>
                <select name="prescription_required">
                    <option value="False">No</option>
                    <option value="True">Yes</option>
                </select>
            </div>
        </div>

        <!-- Product Image -->
        <label>Product Image</label>
        <input type="file" name="image" accept="image/*">

        <!-- Medicine Details Sections -->
        <hr>
        <h3>Medicine Information</h3>

        <div id="content-wrapper">
            <div class="content-block">
                <div class="section-header">
                    <span>Medicine Details Section</span>
                </div>
                
                <label>Section Type</label>
                <select name="section_type[]">
                    <option value="uses">Uses</option>
                    <option value="dosage">Dosage</option>
                    <option value="side_effects">Side Effects</option>
                    <option value="warnings">Warnings</option>
                    <option value="precautions">Precautions</option>
                    <option value="interactions">Interactions</option>
                    <option value="storage">Storage</option>
                    <option value="quick_tips">Quick Tips</option>
                </select>

                <label>Title (Optional)</label>
                <input type="text" name="section_title[]" placeholder="Optional title for this section">

                <label>Content (One point per line)</label>
                <textarea name="section_content[]" placeholder="Enter details (one point per line)" rows="4"></textarea>
            </div>
        </div>

        <button type="button" onclick="addMore()" style="background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin: 10px 0;">+ Add More Section</button>

        <!-- Availability -->
        <div class="form-row">
            <div>
                <label>Availability</label>
                <select name="is_available">
                    <option value="True">Available</option>
                    <option value="False">Not Available</option>
                </select>
            </div>
            <div>
                <label>Featured Product</label>
                <select name="is_featured">
                    <option value="False">No</option>
                    <option value="True">Yes</option>
                </select>
            </div>
        </div>

        <button id="mybtn" type="submit">Add Store Product</button>
    </form>
</div>


<script>
function addMore() {
    let html = `
    <div class="content-block" style="margin-top:15px;">
        <div class="section-header">
            <span>Medicine Details Section</span>
            <button type="button" class="remove-btn" onclick="removeSection(this)">Remove</button>
        </div>
        
        <label>Section Type</label>
        <select name="section_type[]">
            <option value="uses">Uses</option>
            <option value="dosage">Dosage</option>
            <option value="side_effects">Side Effects</option>
            <option value="warnings">Warnings</option>
            <option value="precautions">Precautions</option>
            <option value="interactions">Interactions</option>
            <option value="storage">Storage</option>
            <option value="quick_tips">Quick Tips</option>
        </select>

        <label>Title (Optional)</label>
        <input type="text" name="section_title[]" placeholder="Optional title for this section">

        <label>Content (One point per line)</label>
        <textarea name="section_content[]" placeholder="Enter details (one point per line)" rows="4"></textarea>
    </div>
    `;

    document.getElementById('content-wrapper').insertAdjacentHTML('beforeend', html);
}

function removeSection(button) {
    button.closest('.content-block').remove();
}

</script>

</body>
</html>

{% endblock content %}
