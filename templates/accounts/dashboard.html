{% extends "base.html" %}

{% load static %}

{% block title %}User Dashboard{% endblock title %}

{% block content %}
<link rel="stylesheet" href="{% static 'accounts/dashboard.css' %}">
<div class="dashboard-page">
<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <div class="dashboard-sidebar">

        <div class="sidebar-menu">
            <a href="#" class="active">
                <i class="fa fa-home"></i> Dashboard
            </a>

            <a href="{% url 'my_orders' %}">
                <i class="fa fa-shopping-bag"></i> My Orders
            </a>

            <a href="#">
                <i class="fa fa-user"></i> Edit Profile
            </a>

            <a href="{% url 'forgotPassword' %}">
                <i class="fa fa-lock"></i> Change Password
            </a>
        </div>

        <div class="logout-btn">
            <a href="{% url 'logout' %}">
                <i class="fa fa-sign-out"></i> Logout
            </a>
        </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="dashboard-content">

        <!-- TOP -->
        <div class="dashboard-top">
            <h3>
                Logged in as:
                <span>Rathan Kumar</span>

        </div>

        <div class="dashboard-cards">

            <div class="dashboard-card">
                <h2>Total Orders</h2>
                <h1>12</h1>

                <a href="#">
                    View Orders
                </a>
            </div>

            <!-- PROFILE CARD -->
            <div class="dashboard-card profile-card">

                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">

                <h4>rathan.kumar492@gmail.com</h4>
                <p>+91 9876543210</p>

            </div>

        </div>

    </div>

</div>
</div>

{% endblock content %}
