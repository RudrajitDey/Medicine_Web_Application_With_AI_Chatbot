{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background:  #eaf1f7;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #fff;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3498db;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #3498db;
            border: none;
            color: #fff;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2980b9;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .footer a {
            color: #3498db;
            text-decoration: none;
        }

        .forgot-pass{
            margin-bottom: 20px;
        }

        .forgot-pass a{
            text-decoration: none;
            color: black;
            font-size: 14px;
        }

        .message-box{
            background-color: #8acbf6;
            width: 700px;
        }

        .message-box p{
            padding: 20px 20px 20px 30px;
            
        }

        .message-box p a{
            text-decoration: none;
        }

    </style>
</head>
<body>


<div class="login-box">
    <h2>Reset Password</h2>

                
    <form action="{% url 'resetPassword' %}" method="POST">
        {% csrf_token %}

        <div class="input-group">
            <label>Create Password</label>
            <input type="password" name="password" placeholder="Create Password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        </div>

        
        <button type="submit" class="btn">Reset</button>
    </form>

    <div class="footer">
        <p>Do you have an account? 
            <a href="{% url 'register' %}">Register</a>
        </p>
    </div>
</div>


</body>
</html>
