{% extends "base.html" %}
{% block title %}All Brands{% endblock title %}

{% block content %}

<style>

.brand-hero{
    margin-top:110px;
    padding:70px 20px;
    background:linear-gradient(135deg,#0f172a,#2563eb);
    color:white;
    text-align:center;
}

.brand-grid{
    width:90%;
    max-width:1200px;
    margin:60px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.brand-card{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.brand-card h3{
    color:#2563eb;
}

</style>

<section class="brand-hero">

    <h1>All Brands</h1>

    <p>
        Explore trusted healthcare and medicine brands.
    </p>

</section>

<div class="brand-grid">

    <div class="brand-card">
        <h3>Sun Pharma</h3>
    </div>

    <div class="brand-card">
        <h3>Cipla</h3>
    </div>

    <div class="brand-card">
        <h3>Dr. Reddy's</h3>
    </div>

    <div class="brand-card">
        <h3>Abbott</h3>
    </div>

</div>

{% endblock content %}
