{% extends "base.html" %}
{% block title %}All Salts{% endblock title %}

{% block content %}

<style>

.main-section{
    margin-top:110px;
    padding:70px 20px;
    background:linear-gradient(135deg,#0f172a,#2563eb);
    color:white;
    text-align:center;
}

.salt-grid{
    width:90%;
    max-width:1200px;
    margin:60px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.salt-card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.salt-card h3{
    color:#2563eb;
}

</style>

<section class="main-section">

    <h1>All Salts</h1>

    <p>
        Browse medicine salts and compositions.
    </p>

</section>

<div class="salt-grid">

    <div class="salt-card">
        <h3>Paracetamol</h3>
    </div>

    <div class="salt-card">
        <h3>Azithromycin</h3>
    </div>

    <div class="salt-card">
        <h3>Amoxicillin</h3>
    </div>

    <div class="salt-card">
        <h3>Cetirizine</h3>
    </div>

</div>

{% endblock content %}
