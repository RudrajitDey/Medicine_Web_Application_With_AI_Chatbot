{% extends "base.html" %}

{% block title %}All Medicines{% endblock title %}

{% block content %}
<style>
    body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fa;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* Grid Layout */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 20px;
  padding:20px;
}

/* Card */
.medicine-card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.medicine-card:hover {
  transform: translateY(-5px);
}

/* Image */
.medicine-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

/* Body */
.card-body {
  padding: 15px;
}

.medicine-name {
  font-size: 18px;
  margin: 0;
}

.medicine-brand {
  font-size: 14px;
  color: #777;
  margin: 5px 0;
}

.medicine-price {
  font-size: 16px;
  font-weight: bold;
  color: #28a745;
}

/* Buttons */
.card-actions {
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

.btn {
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.view-btn {
  background: #007bff;
  color: white;
}

.cart-btn {
  background: #28a745;
  color: white;
}

.btn:hover {
  opacity: 0.9;
}
</style>


<div class="card-grid">
  {% for p in seller_products %}
  <div class="medicine-card" onclick="window.location.href='{% url 'product_detail' p.slug %}'" style="cursor:pointer;">

    <img src="{{ p.image.url }}" alt="Medicine">

    <div class="card-body">
      <h3 class="medicine-name">{{ p.name }}</h3>
      <p class="medicine-brand">{{ p.brand }}</p>
      <p class="medicine-price">₹{{ p.price }}</p>

      <div class="card-actions">
        <a href="{% url 'product_detail' p.slug %}" class="btn view-btn">View</a>
        <a href="#" class="btn cart-btn">Add to Cart</a>
      </div>
    </div>

  </div>
  {% endfor %}
</div>

{% endblock content %}
