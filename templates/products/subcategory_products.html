<style>
    .page-title {
    font-size: 28px;
    margin: 20px 0;
    font-weight: 600;
}

/* GRID */
.product-grid {
  margin: 35px 100px 0px 100px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-evenly;
  gap: 15px;
}

/* CARD */
.card {
  height: auto;
  width:250px;
  overflow: hidden;
  background-color:white;
  border-radius: 1rem;
  margin-bottom: 20px;
  border: 1px solid rgb(230, 228, 228);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

/* IMAGE */
.card-img {
    background: #f8f8f8;
    padding: 20px;
    text-align: center;
}

.card-img img {
    height: 160px;
    object-fit: cover;
    transition: 0.3s;
}

.card:hover img {
    transform: scale(1.08);
}

/* BODY */
.card-body {
    padding: 15px;
    text-align: center;
}

.card-body h4 {
    font-size: 16px;
    margin-bottom: 10px;
}

/* PRICE */
.price {
    font-size: 18px;
    font-weight: bold;
    color: #2e7d32;
    margin-bottom: 12px;
}

/* BUTTON */
.btn {
    background: #2e7d32;
    color: #fff;
    border: none;
    padding: 10px 15px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
}

.btn:hover {
    background: #1b5e20;
}
</style>

<h2 class="page-title">{{ subcategory.name }}</h2>

<div class="product-grid">
    {% for product in products %}
    
    <div class="card" data-url="{% url 'store_product_detail' product.slug %}" style="cursor:pointer;" onclick="window.location.href=this.dataset.url;">
        <div class="card-img">
            <img src="{{ product.product_image.url }}" alt="{{ product.product_name }}">
        </div>

        <div class="card-body">
            <h4>{{ product.product_name }}</h4>

            <div class="price">₹299</div>

            <a href="{% url 'add_to_cart' product.id 'store' %}"><button class="btn">Add to Cart</button></a>
        </div>
    </div>

    {% endfor %}
</div>
